# Main Settings
settings:
  # Automatic cleanup (true/false)
  auto-cleanup-enabled: false
  # Cleanup on server startup
  cleanup-on-startup: true
  # Auto-cleanup interval (in ticks, 20 ticks = 1 second)
  cleanup-interval-ticks: 6000

# Emergency Cleanup Settings
emergency:
  # React to low TPS
  low-tps:
    enabled: true
    # TPS threshold to trigger cleanup (recommended 15.0-18.0)
    threshold: 15.0
    # Minimum number of items to trigger reaction (0 = disabled)
    min-items: 50

  # React to item overflow
  items-overflow:
    enabled: true
    # Global item limit
    global-threshold: 500
    # Item limits for specific worlds
    world-limits:
      world: 300
      world_nether: 100
      world_the_end: 200

# Advanced Settings
advanced:
  # Cooldown between emergency cleanups (in seconds)
  cooldown: 60
  # Ignore these item types
  protected-items:
    - "minecraft:nether_star"
    - "minecraft:dragon_egg"
    - "minecraft:enchanted_golden_apple"