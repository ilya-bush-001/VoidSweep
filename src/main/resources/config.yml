# VoidSweep Configuration
# ========================

# Automatic cleanup every X ticks (6000 = 5 minutes)
cleanup-interval-ticks: 6000

# Global settings
auto-cleanup-enabled: false
cleanup-on-startup: true

# Settings for low TPS
low-tps-threshold: 15.0  # If TPS is below this value, cleanup
low-tps-cleanup-enabled: true

# Settings for item limit
max-items-threshold: 500  # Maximum number of items before cleanup
items-cleanup-enabled: true

# Personal limits for worlds (optional)
world-limits:
  world: 300
  world_nether: 100
  world_the_end: 200